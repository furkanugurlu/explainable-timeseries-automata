# Configuration file for Explainable Time Series Automata Anomaly Detection

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  datasets:
    skab:
      path: "data/raw/skab"
      file_pattern: "*.csv"
    batadal:
      path: "data/raw/batadal"
      file_pattern: "*.csv"

training:
  epochs: 50
  batch_size: 32
  patience: 5
  seeds:
    - 42
    - 123
    - 2026
    - 7
    - 999

automata:
  epsilon: 0.00001                 # Laplace smoothing for unseen transitions
  anomaly_threshold_percentile: 5  # 5th percentile of train path probs as threshold
  parameter_variations:
    window_sizes: [3, 4, 5, 6]
    alphabet_sizes: [3, 4, 5, 6]
  defaults:
    window_size: 4
    alphabet_size: 3

models:
  dl: [LSTM, GRU, CNN1D]

experiments:
  noise_scale: 0.15        # Gaussian noise scenario scale (spec)
  cross_dataset: true      # enables Day 3 cross-dataset runs

logging:
  level: "INFO"
  log_dir: "logs"
